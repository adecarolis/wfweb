name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
            deb_arch: amd64
            label: Linux x86_64
          - os: ubuntu-24.04-arm
            arch: arm64
            deb_arch: arm64
            label: Raspberry Pi / Linux ARM64

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt5-qmake qtbase5-dev libqt5serialport5-dev \
            qtmultimedia5-dev libqt5websockets5-dev \
            libqt5gamepad5-dev libqt5printsupport5 \
            libopus-dev libeigen3-dev \
            portaudio19-dev librtaudio-dev \
            libhidapi-dev libudev-dev libpulse-dev \
            libqcustomplot-dev \
            openssl dpkg-dev

      - name: Build
        run: |
          qmake wfview.pro
          make -j$(nproc)

      - name: Get version
        id: version
        run: echo "version=$(grep 'WFVIEW_VERSION' wfview.pro | grep -oP '[\d.]+')" >> $GITHUB_OUTPUT

      - name: Package tarball
        run: |
          sudo make install INSTALL_ROOT=$(pwd)/dist
          sudo chown -R $(id -u):$(id -g) dist
          tar czf wfweb-${{ matrix.arch }}.tar.gz -C dist .

      - name: Build .deb
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DEB_ROOT=$(pwd)/deb-build/wfweb_${VERSION}_${{ matrix.deb_arch }}

          # Mirror the install tree
          sudo make install INSTALL_ROOT=${DEB_ROOT}
          sudo chown -R $(id -u):$(id -g) $(pwd)/deb-build

          # Create DEBIAN control directory
          mkdir -p ${DEB_ROOT}/DEBIAN

          # Runtime dependencies
          cat > ${DEB_ROOT}/DEBIAN/control << EOF
          Package: wfweb
          Version: ${VERSION}
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: Alain De Carolis <adecarolis@users.noreply.github.com>
          Depends: openssl, libqt5core5t64, libqt5gui5t64, libqt5widgets5t64,
           libqt5network5t64, libqt5serialport5, libqt5multimedia5,
           libqt5websockets5, libqt5gamepad5, libqt5printsupport5t64,
           libopus0, libportaudio2, libpulse0, libhidapi-libusb0,
           libudev1, libqcustomplot2.1, librtaudio6
          Section: hamradio
          Priority: optional
          Homepage: https://github.com/adecarolis/wfweb
          Description: wfview fork with built-in web interface for browser-based ham radio remote control.
           wfweb adds an HTTPS/WebSocket server to wfview, enabling full radio
           control and real-time audio streaming from any browser without
           installing client software. Based on wfview by Elliott H. Liggett W6EL
           and Phil E. Taylor M0VSE (https://gitlab.com/eliggett/wfview).
          EOF

          # Strip leading whitespace from control file (heredoc indentation)
          sed -i 's/^          //' ${DEB_ROOT}/DEBIAN/control

          # postinst: reload systemd so the unit is recognised immediately
          printf '#!/bin/sh\nset -e\n' > ${DEB_ROOT}/DEBIAN/postinst
          printf 'if command -v systemctl >/dev/null 2>&1 && systemctl is-system-running --quiet 2>/dev/null; then\n' >> ${DEB_ROOT}/DEBIAN/postinst
          printf '    systemctl daemon-reload || true\nfi\n' >> ${DEB_ROOT}/DEBIAN/postinst
          printf 'echo "wfweb installed. To start automatically at boot, run:"\n' >> ${DEB_ROOT}/DEBIAN/postinst
          printf 'echo "  systemctl enable --now wfweb@\$USER"\n' >> ${DEB_ROOT}/DEBIAN/postinst
          chmod 755 ${DEB_ROOT}/DEBIAN/postinst

          dpkg-deb --build --root-owner-group ${DEB_ROOT}

          mv deb-build/wfweb_${VERSION}_${{ matrix.deb_arch }}.deb wfweb_${VERSION}_${{ matrix.deb_arch }}.deb

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: wfweb-${{ matrix.arch }}-tar
          path: wfweb-${{ matrix.arch }}.tar.gz
          retention-days: 30

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: wfweb-${{ matrix.arch }}-deb
          path: wfweb_*_${{ matrix.deb_arch }}.deb
          retention-days: 30

  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Qt5
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone RTAudio
        # The .pro compiles RTAudio from source on non-Linux; clone to the
        # sibling directory it expects.
        run: git clone --depth 1 https://github.com/thestk/rtaudio.git ../rtaudio

      - name: Install vcpkg packages
        shell: pwsh
        run: |
          $triplet = "x64-windows"
          $pkgs = "opus", "portaudio", "hidapi", "openssl", "eigen3", "qcustomplot"
          foreach ($pkg in $pkgs) {
            vcpkg install "${pkg}:${triplet}"
          }
          # Alias qcustomplot → qcustomplot2 to match the lib name used in wfview.pro
          $lib = "$env:VCPKG_INSTALLATION_ROOT\installed\$triplet\lib"
          if (Test-Path "$lib\qcustomplot.lib") {
            Copy-Item "$lib\qcustomplot.lib" "$lib\qcustomplot2.lib"
          }
          $bin = "$env:VCPKG_INSTALLATION_ROOT\installed\$triplet\bin"
          if (Test-Path "$bin\qcustomplot.dll") {
            Copy-Item "$bin\qcustomplot.dll" "$bin\qcustomplot2.dll"
          }

      - name: Build
        shell: cmd
        env:
          VCPKG_DIR: ${{ env.VCPKG_INSTALLATION_ROOT }}\installed\x64-windows
        run: |
          qmake wfview.pro CONFIG+=release
          nmake release

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = (Select-String -Path wfview.pro -Pattern 'WFVIEW_VERSION=\\\"([\d.]+)\\\"').Matches[0].Groups[1].Value
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Package zip
        shell: pwsh
        env:
          VCPKG_DIR: ${{ env.VCPKG_INSTALLATION_ROOT }}\installed\x64-windows
        run: |
          $dest = "wfweb-windows-x64"
          New-Item -ItemType Directory -Force -Path $dest

          # Application binary
          Copy-Item "wfview-release\wfview.exe" $dest\

          # Qt runtime DLLs
          windeployqt "$dest\wfview.exe" --release --no-translations

          # vcpkg runtime DLLs
          Copy-Item "$env:VCPKG_DIR\bin\*.dll" $dest\ -ErrorAction SilentlyContinue

          # Rig definition files
          Copy-Item -Recurse rigs "$dest\rigs"

          Compress-Archive -Path $dest -DestinationPath wfweb-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wfweb-windows-x64
          path: wfweb-windows-x64.zip
          retention-days: 30

  release:
    name: Publish release
    needs: [build, build-windows]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wfweb-x86_64-tar/wfweb-x86_64.tar.gz
            wfweb-arm64-tar/wfweb-arm64.tar.gz
            wfweb-x86_64-deb/*.deb
            wfweb-arm64-deb/*.deb
            wfweb-windows-x64/wfweb-windows-x64.zip
          generate_release_notes: true
          overwrite: true
